name: iOS Unsigned Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova CLI
        run: npm install -g cordova@12

      - name: Install npm dependencies
        run: npm install

      - name: Add iOS platform
        run: cordova platform add ios@7.0.0

      - name: Add Cordova plugins
        run: cordova plugin add cordova-plugin-inappbrowser@6.0.0 || true

      - name: Build iOS App (Unsigned)
        run: |
          mkdir -p build
          cordova build ios --release --device \
            --buildFlag="CODE_SIGNING_ALLOWED=NO" \
            --buildFlag="CODE_SIGNING_REQUIRED=NO" \
            --buildFlag="CODE_SIGN_IDENTITY=" \
            --buildFlag="CONFIGURATION_BUILD_DIR=$GITHUB_WORKSPACE/build"

      - name: Package Unsigned IPA
        run: |
          # The app file is now guaranteed to be in the build directory
          APP_PATH=$(find build -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Searching wider workspace..."
            APP_PATH=$(find . -name "*.app" -not -path "*/node_modules/*" | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: Could not find any .app files. The build must have failed."
            exit 1
          fi
          
          echo "Packaging app from: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r BVApp-unsigned.ipa Payload/
          echo "✅ IPA created successfully"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: BVApp-unsigned.ipa
          if-no-files-found: error
