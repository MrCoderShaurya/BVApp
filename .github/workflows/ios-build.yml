name: Build iOS Unsigned

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova@9

      - name: Install Dependencies
        run: npm install

      - name: Add iOS Platform
        run: cordova platform add ios

      - name: Prepare
        run: cordova prepare ios

      - name: Build Xcode Project (Unsigned)
        run: |
          cd platforms/ios
          xcodebuild \
            -workspace "Bhakti Vedanta App.xcworkspace" \
            -scheme "Bhakti Vedanta App" \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: platforms/ios/build
