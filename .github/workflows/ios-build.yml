name: iOS Unsigned Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova CLI
        run: npm install -g cordova@12

      - name: Install npm dependencies
        run: npm install

      - name: Add iOS platform
        run: cordova platform add ios@7.0.0

      - name: Add Cordova plugins
        run: cordova plugin add cordova-plugin-inappbrowser@6.0.0 || true

      - name: Cordova prepare
        run: cordova prepare ios

      - name: Install CocoaPods dependencies
        run: |
          cd platforms/ios
          pod install --repo-update

      - name: Build CordovaLib Target First (Unsigned)
        run: |
          xcodebuild \
            -workspace "platforms/ios/Bhakti Vedanta App.xcworkspace" \
            -scheme "CordovaLib" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$GITHUB_WORKSPACE/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO > build_lib.log 2>&1 || (cat build_lib.log && exit 1)

      - name: Build Main App Target (Unsigned)
        run: |
          xcodebuild \
            -workspace "platforms/ios/Bhakti Vedanta App.xcworkspace" \
            -scheme "Bhakti Vedanta App" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$GITHUB_WORKSPACE/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            ENABLE_BITCODE=NO \
            ENABLE_ON_DEMAND_RESOURCES=NO > build_app.log 2>&1 || (cat build_app.log && exit 1)

      - name: Package Unsigned IPA
        run: |
          # Find the app file in compiled DerivedData
          APP_PATH=$(find "$GITHUB_WORKSPACE/DerivedData" -name "*.app" -not -path "*/intermediates/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: Could not find any compiled .app files."
            exit 1
          fi
          
          echo "Patching MinimumOSVersion to 9.0 in Info.plist"
          plutil -replace MinimumOSVersion -string "9.0" "$APP_PATH/Info.plist"
          
          echo "Packaging app from: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r BVApp-unsigned.ipa Payload/
          echo "✅ IPA created successfully"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: BVApp-unsigned.ipa
          if-no-files-found: error
