name: Build iOS Faster

on:
  workflow_dispatch:

jobs:
  build:
    # Use the latest available Mac runner for faster queue times
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install Project Dependencies
        run: npm install

      - name: Add iOS Platform
        run: |
          cordova platform rm ios || true
          cordova platform add ios --verbose

      - name: Build Unsigned App
        run: |
          cd platforms/ios
          # Allow xcodebuild to use the default installed Xcode version
          xcodebuild \
            -workspace "Bhakti Vedanta App.xcworkspace" \
            -scheme "Bhakti Vedanta App" \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build | tee build.log

      - name: Package .app into .ipa
        run: |
          mkdir -p Payload
          # Automatically find the app file wherever it landed
          APP_PATH=$(find platforms/ios/build -type d -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "*.app" | head -n 1)
          fi
          
          echo "Packaging app from: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Bhakti-Vedanta-iOS-App
          path: app.ipa
