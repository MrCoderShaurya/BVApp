name: Build iOS Unsigned

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Show Environment
        run: |
          sw_vers
          xcodebuild -version
          node -v
          npm -v

      - name: Install Cordova
        run: npm install -g cordova@9

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Project Dependencies
        run: npm install

      - name: Remove Existing iOS Platform
        run: |
          cordova platform rm ios || true

      - name: Add iOS Platform
        run: |
          cordova platform add ios@5.1.1 --verbose

      - name: Prepare Project
        run: |
          cordova prepare ios --verbose

      - name: Build Unsigned App
        run: |
          cd platforms/ios
          xcodebuild \
            -workspace "Bhakti Vedanta App.xcworkspace" \
            -scheme "Bhakti Vedanta App" \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build | tee build.log

      - name: Package .app into a valid .ipa file
        run: |
          mkdir -p Payload
          # Find the generated .app bundle and copy it into the Payload folder
          APP_PATH=$(find platforms/ios/build -type d -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -type d -name "*.app" | head -n 1)
          fi
          echo "Found compiled app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          # Zip the Payload folder into a real .ipa structure
          zip -r Bhakti_Vedanta_App.ipa Payload

      - name: Upload Finished IPA for Sideloadly
        uses: actions/upload-artifact@v4
        with:
          name: Bhakti-Vedanta-Unsigned-IPA
          path: Bhakti_Vedanta_App.ipa
