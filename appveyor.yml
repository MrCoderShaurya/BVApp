image: macos-monterey

environment:
  NODE_VERSION: "16"

install:
  - node --version
  - npm install -g cordova@11.1.0
  - npm install
  - cordova platform add ios@5.1.1
  - cordova prepare ios
  # Resize icons to exact required pixel dimensions using sips
  - node resize_icons.js
  # Patch the storyboard to use classic calibratedWhite color space (iOS 9 compatible)
  - node patch_storyboard.js



build_script:
  # Automatically find and select any Xcode 13.x app
  - |
    XCODE_PATH=$(find /Applications -maxdepth 1 \( -name "*13*.app" -o -name "Xcode*13*.app" \) | head -n 1)
    if [ -z "$XCODE_PATH" ]; then
      echo "--- ERROR: Xcode 13 not found! Listing all Xcode apps in /Applications ---"
      ls -la /Applications | grep -i xcode
      exit 1
    fi
    echo "Found Xcode 13 at: $XCODE_PATH"
    sudo xcode-select -s "$XCODE_PATH"
  - xcodebuild -version

  # Build CordovaLib dependency first
  - xcodebuild -workspace "platforms/ios/Bhakti Vedanta App.xcworkspace" -scheme "CordovaLib" -configuration Release -sdk iphoneos -derivedDataPath "$PWD/DerivedData" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO ARCHS="armv7 arm64" VALID_ARCHS="armv7 arm64" IPHONEOS_DEPLOYMENT_TARGET=9.0

  # Build the main app target for armv7 and arm64, targeting iOS 9.0
  - xcodebuild -workspace "platforms/ios/Bhakti Vedanta App.xcworkspace" -scheme "Bhakti Vedanta App" -configuration Release -sdk iphoneos -derivedDataPath "$PWD/DerivedData" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO AD_HOC_CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=9.0 ENABLE_BITCODE=NO ENABLE_ON_DEMAND_RESOURCES=NO ARCHS="armv7 arm64" VALID_ARCHS="armv7 arm64"


after_build:
  - mkdir -p Payload
  - |
    APP_PATH="$PWD/DerivedData/Build/Products/Release-iphoneos/Bhakti Vedanta App.app"
    if [ ! -d "$APP_PATH" ]; then
      echo "Warning: Direct path not found, falling back to find search..."
      APP_PATH=$(find /usr/local/Cellar /Users/appveyor -name "Bhakti Vedanta App.app" 2>/dev/null | head -n 1)
    fi
    echo "Found app bundle at: $APP_PATH"
    cp -r "$APP_PATH" Payload/
    # Thin the binary to armv7-only so sideloading tools don't get IncorrectArchitecture
    BINARY="Payload/Bhakti Vedanta App.app/Bhakti Vedanta App"
    echo "Thinning binary to armv7..."
    lipo -thin armv7 "$BINARY" -output "$BINARY"
    echo "Binary architectures after thinning:"
    lipo -info "$BINARY"
  - zip -r BVApp-armv7-only.ipa Payload/

artifacts:
  - path: BVApp-armv7-only.ipa
    name: BVApp-armv7-only
