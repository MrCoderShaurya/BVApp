image: macos-monterey

environment:
  NODE_VERSION: "16"

install:
  - node --version
  - npm install -g cordova@11.1.0
  - npm install
  - cordova platform add ios@6.3.0
  - cordova prepare ios

build_script:
  # Automatically find and select any Xcode 13.x app
  - |
    XCODE_PATH=$(find /Applications -maxdepth 1 \( -name "*13*.app" -o -name "Xcode*13*.app" \) | head -n 1)
    if [ -z "$XCODE_PATH" ]; then
      echo "--- ERROR: Xcode 13 not found! Listing all Xcode apps in /Applications ---"
      ls -la /Applications | grep -i xcode
      exit 1
    fi
    echo "Found Xcode 13 at: $XCODE_PATH"
    sudo xcode-select -s "$XCODE_PATH"
  - xcodebuild -version

  # Build CordovaLib dependency first
  - xcodebuild \
      -workspace "platforms/ios/Bhakti Vedanta App.xcworkspace" \
      -scheme "CordovaLib" \
      -configuration Release \
      -sdk iphoneos \
      -derivedDataPath "$PWD/DerivedData" \
      CODE_SIGN_IDENTITY="" \
      CODE_SIGNING_REQUIRED=NO \
      CODE_SIGNING_ALLOWED=NO \
      ARCHS="armv7 arm64" \
      VALID_ARCHS="armv7 arm64"

  # Build the main app target for armv7 and arm64, targeting iOS 9.0
  - xcodebuild \
      -workspace "platforms/ios/Bhakti Vedanta App.xcworkspace" \
      -scheme "Bhakti Vedanta App" \
      -configuration Release \
      -sdk iphoneos \
      -derivedDataPath "$PWD/DerivedData" \
      CODE_SIGN_IDENTITY="" \
      CODE_SIGNING_REQUIRED=NO \
      CODE_SIGNING_ALLOWED=NO \
      AD_HOC_CODE_SIGNING_ALLOWED=NO \
      IPHONEOS_DEPLOYMENT_TARGET=9.0 \
      ENABLE_BITCODE=NO \
      ENABLE_ON_DEMAND_RESOURCES=NO \
      ARCHS="armv7 arm64" \
      VALID_ARCHS="armv7 arm64"

after_build:
  - mkdir -p Payload
  - cp -r "DerivedData/Build/Products/Release-iphoneos/Bhakti Vedanta App.app" Payload/
  - zip -r BVApp-unsigned-32bit.ipa Payload/

artifacts:
  - path: BVApp-unsigned-32bit.ipa
    name: BVApp-unsigned-32bit
