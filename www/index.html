<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <!-- Enable viewport scale for user pinch-to-zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes">
    <title>Meet Notes App</title>
    <link rel="stylesheet" type="text/css" href="css/index.css">
</head>

<body>

    <!-- Main App Header -->
    <header class="app-header">
        <button id="btn-header-home" class="header-btn hidden">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
        </button>
        
        <h1 id="header-title" class="header-title">Meet & Notes</h1>
        
        <div class="header-actions">
            <!-- Software Zoom Controls -->
            <button id="btn-zoom-out" class="header-btn hidden" title="Zoom Out">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor" d="M19 13H5v-2h14v2z" />
                </svg>
            </button>
            <span id="zoom-level-indicator" class="zoom-indicator hidden">100%</span>
            <button id="btn-zoom-in" class="header-btn hidden" title="Zoom In">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
            </button>
            <button id="btn-header-refresh" class="header-btn hidden">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main class="app-main">
        
        <!-- Section 1: Dashboard (Launcher & Meet Portal) -->
        <section id="view-dashboard" class="content-view active">
            <div class="hero-banner">
                <h2 class="hero-title">Meet & Notes</h2>
                <p class="hero-subtitle">Zoom meetings, Google Meet & Canvas Notes</p>
            </div>
            
            <div class="launcher-grid">
                <!-- Zoom Meeting Launcher -->
                <div class="launcher-card">
                    <div class="card-header zoom-color">
                        <svg viewBox="0 0 24 24" width="32" height="32">
                            <path fill="currentColor" d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z" />
                        </svg>
                        <h3>Zoom Launcher</h3>
                    </div>
                    <div class="card-body">
                        <p class="card-desc">Enter a Zoom meeting Link or ID to get started:</p>
                        <input type="text" id="zoom-url-input" class="launcher-input" placeholder="https://zoom.us/j/... or Meeting ID">
                        
                        <div class="launcher-actions">
                            <button id="btn-launch-zoom-iframe" class="brand-btn zoom-btn">
                                <span>Load in App (Webview)</span>
                            </button>
                            <button id="btn-launch-zoom-native" class="outline-btn">
                                <span>Open in Zoom App</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Google Meet Launcher -->
                <div class="launcher-card">
                    <div class="card-header meet-color">
                        <svg viewBox="0 0 24 24" width="32" height="32">
                            <path fill="currentColor" d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 12H9v-2h6v2zm3-4H6V8h12v4z" />
                        </svg>
                        <h3>Google Meet Launcher</h3>
                    </div>
                    <div class="card-body">
                        <p class="card-desc">Enter Google Meet link or code to join:</p>
                        <input type="text" id="meet-url-input" class="launcher-input" placeholder="https://meet.google.com/abc-defg-hij">
                        
                        <div class="launcher-actions">
                            <button id="btn-launch-meet-iframe" class="brand-btn meet-btn">
                                <span>Load in App (Webview)</span>
                            </button>
                            <button id="btn-launch-meet-native" class="outline-btn">
                                <span>Open in Safari / Meet App</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section 2: WebView frame view (Zoom / Google Meet Embedded) -->
        <section id="view-meeting-portal" class="content-view">
            <div class="iframe-container">
                <div class="spinner-container" id="portal-spinner">
                    <div class="loading-spinner"></div>
                    <p>Connecting to Meeting...</p>
                </div>
                <div class="iframe-scroll-wrapper" id="portal-zoom-wrapper">
                    <iframe id="iframe-meeting-portal" class="content-iframe" frameborder="0"></iframe>
                </div>
            </div>
        </section>

        <!-- Section 3: Notes List & Editor Panel -->
        <section id="view-notes" class="content-view">
            
            <!-- Subview 3A: Notes List -->
            <div id="notes-list-subview" class="notes-subview active">
                <div class="notes-search-bar">
                    <span class="search-icon">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                        </svg>
                    </span>
                    <input type="text" id="notes-search-input" placeholder="Search my notes...">
                </div>

                <div id="notes-container" class="notes-grid">
                    <!-- Dynamic Note Cards populate here -->
                </div>

                <!-- Floating FAB for new note -->
                <button id="btn-fab-new-note" class="fab-btn">
                    <svg viewBox="0 0 24 24" width="28" height="28">
                        <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                    </svg>
                </button>
            </div>

            <!-- Subview 3B: Notes Canvas & Text Editor -->
            <div id="notes-editor-subview" class="notes-subview">
                
                <!-- Floating canvas drawing overlay -->
                <div class="canvas-container">
                    <canvas id="note-canvas"></canvas>
                </div>

                <!-- Textarea input field -->
                <textarea id="note-text-input" class="editor-textarea" placeholder="Start typing details here..."></textarea>

                <!-- Floating Ribbon Bar -->
                <div class="editor-ribbon">
                    <div class="ribbon-tools">
                        <button class="ribbon-btn active" data-tool="text" title="Text Editor">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12.5 8h-5v1.5h1.75v6h1.5v-6h1.75V8zM19 4H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H5V6h14v12z"/></svg>
                            <span>Type</span>
                        </button>
                        <button class="ribbon-btn" data-tool="pen" title="Sketch Pen">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                            <span>Draw</span>
                        </button>
                        <button class="ribbon-btn" data-tool="eraser" title="Eraser">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M16.24 7.76c.59.59.59 1.54 0 2.12l-6.88 6.88c-.59.59-1.54.59-2.12 0l-4.24-4.24c-.59-.59-.59-1.54 0-2.12l6.88-6.88c.59-.59 1.54-.59 2.12 0l4.24 4.24zM1.39 12.01l4.24 4.24L1.39 12.01zm19.8-5.66l-4.24-4.24 4.24 4.24z"/></svg>
                            <span>Erase</span>
                        </button>
                    </div>

                    <div class="ribbon-actions">
                        <button id="btn-save-note" class="save-btn">Save</button>
                        <button id="btn-cancel-note" class="cancel-btn">Cancel</button>
                    </div>
                </div>

                <!-- Custom Ribbon Settings Drawer -->
                <div class="editor-settings-drawer hidden">
                    <!-- Pen colors -->
                    <div class="settings-group">
                        <span class="settings-label">Color</span>
                        <div class="color-options">
                            <button class="color-dot active" data-color="#000000" style="background-color: #000000;"></button>
                            <button class="color-dot" data-color="#3182ce" style="background-color: #3182ce;"></button>
                            <button class="color-dot" data-color="#e53e3e" style="background-color: #e53e3e;"></button>
                            <button class="color-dot" data-color="#38a169" style="background-color: #38a169;"></button>
                            <button class="color-dot" data-color="#dd6b20" style="background-color: #dd6b20;"></button>
                        </div>
                    </div>
                    <!-- Brush sizes -->
                    <div class="settings-group">
                        <span class="settings-label">Size</span>
                        <div class="brush-sizes">
                            <button class="size-btn active" data-thickness="3">Thin</button>
                            <button class="size-btn" data-thickness="6">Medium</button>
                            <button class="size-btn" data-thickness="12">Thick</button>
                        </div>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="app-nav">
        <button class="nav-tab active" data-tab="dashboard">
            <svg viewBox="0 0 24 24" class="nav-icon">
                <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-tab" data-tab="meeting-portal" id="tab-meeting-portal">
            <svg viewBox="0 0 24 24" class="nav-icon">
                <path fill="currentColor" d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 9H3V5h9v7zm9 7h-9v-7h9v7z" />
            </svg>
            <span class="nav-label">Meeting</span>
        </button>
        <button class="nav-tab" data-tab="notes">
            <svg viewBox="0 0 24 24" class="nav-icon">
                <path fill="currentColor" d="M14.06 9.02l.92.92L5.92 19H5v-.92l9.06-9.06M17.66 3c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 17.25V21h3.75L17.81 9.94l-3.75-3.75z" />
            </svg>
            <span class="nav-label">My Notes</span>
        </button>
    </nav>

    <!-- Cordova Scripts -->
    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript" src="js/index.js"></script>
</body>

</html>
