workflows:

  # ============================================================
  # iOS BUILD — Uses Codemagic Automatic Signing via Apple ID
  # No manual .p12 or provisioning profile needed!
  # ============================================================
  ios-development:
    name: iOS Development Build (iPad iOS 9.3.5)
    max_build_duration: 60

    environment:
      xcode: 9.4.1       # Last Xcode supporting iOS 9.x deployment target
      node: 16
      vars:
        BUNDLE_ID: "com.bvapp.bhaktivedanta"
        XCODE_SCHEME: "Bhakti Vedanta App"

      # ── Codemagic Automatic Signing ──────────────────────────────────────────
      # In Codemagic UI go to:
      #   App Settings → Environment variables → Add:
      #     APP_STORE_CONNECT_ISSUER_ID   (from App Store Connect → Keys)
      #     APP_STORE_CONNECT_KEY_IDENTIFIER
      #     APP_STORE_CONNECT_PRIVATE_KEY  (the .p8 file content)
      #     CERTIFICATE_PRIVATE_KEY        (RSA private key)
      # Codemagic will create + manage certificates & profiles automatically!
      # ─────────────────────────────────────────────────────────────────────────
      ios_signing:
        distribution_type: development
        bundle_identifier: com.bvapp.bhaktivedanta

    scripts:
      # 1. Update bundle ID in config.xml
      - name: Set Bundle ID
        script: |
          sed -i 's/com\.example\.bvapp/com.bvapp.bhaktivedanta/g' config.xml

      # 2. Install Cordova CLI
      - name: Install Cordova CLI
        script: |
          npm install -g cordova@9.0.0

      # 3. Install npm dependencies
      - name: Install npm dependencies
        script: |
          npm install

      # 4. Add iOS platform
      - name: Add iOS platform
        script: |
          cordova platform add ios@4.5.5 || echo "Platform already added"

      # 5. Add plugins
      - name: Add Cordova plugins
        script: |
          cordova plugin add cordova-plugin-whitelist@1.3.5 || true
          cordova plugin add cordova-plugin-inappbrowser@3.2.0 || true

      # 6. Prepare Cordova
      - name: Cordova Prepare iOS
        script: |
          cordova prepare ios

      # 7. Build Archive
      - name: Build iOS Archive
        script: |
          xcodebuild \
            -project "platforms/ios/Bhakti Vedanta App.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/BVApp.xcarchive" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="com.bvapp.bhaktivedanta" \
            archive

      # 8. Generate ExportOptions.plist
      - name: Generate ExportOptions
        script: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>$(APPLE_TEAM_ID)</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      # 9. Export IPA
      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/BVApp.xcarchive" \
            -exportPath "$CM_BUILD_DIR/output" \
            -exportOptionsPlist /tmp/ExportOptions.plist

    artifacts:
      - $CM_BUILD_DIR/output/*.ipa
      - $CM_BUILD_DIR/output/*.plist

  # ============================================================
  # ANDROID DEBUG BUILD — No signing needed
  # ============================================================
  android-debug:
    name: Android Debug Build
    max_build_duration: 30

    environment:
      node: 16
      java: 11

    scripts:
      - name: Install Cordova CLI
        script: npm install -g cordova@9.0.0

      - name: Install npm dependencies
        script: npm install

      - name: Add Android platform
        script: cordova platform add android || echo "Already added"

      - name: Add Cordova plugins
        script: |
          cordova plugin add cordova-plugin-whitelist@1.3.5 || true
          cordova plugin add cordova-plugin-inappbrowser@3.2.0 || true

      - name: Build Android debug APK
        script: cordova build android --debug

    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apk
