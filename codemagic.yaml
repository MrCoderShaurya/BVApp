workflows:

  # ============================================================
  # iOS UNSIGNED BUILD — No Apple Developer Account Needed
  # Produces an unsigned .ipa you can install via Sideloadly
  # ============================================================
  ios-adhoc:
    name: iOS Unsigned Build (Sideload via Sideloadly)
    max_build_duration: 60

    environment:
      xcode: 9.4.1
      node: 16
      vars:
        BUNDLE_ID: "com.bvapp.bhaktivedanta"
        XCODE_SCHEME: "Bhakti Vedanta App"

    scripts:
      # 1. Install Cordova CLI
      - name: Install Cordova CLI
        script: |
          npm install -g cordova@9.0.0

      # 2. Install npm dependencies
      - name: Install npm dependencies
        script: |
          npm install

      # 3. Add iOS platform
      - name: Add iOS platform
        script: |
          cordova platform add ios@4.5.5 || echo "Platform already added"

      # 4. Add required plugins
      - name: Add Cordova plugins
        script: |
          cordova plugin add cordova-plugin-whitelist@1.3.5 || true
          cordova plugin add cordova-plugin-inappbrowser@3.2.0 || true

      # 5. Cordova Prepare
      - name: Cordova Prepare iOS
        script: |
          cordova prepare ios

      # 6. Build unsigned .app (no signing)
      - name: Build iOS (unsigned)
        script: |
          xcodebuild \
            -project "platforms/ios/Bhakti Vedanta App.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            build

      # 7. Package .app into unsigned .ipa
      - name: Package unsigned IPA
        script: |
          APP_PATH=$(find "$CM_BUILD_DIR/DerivedData" -name "*.app" | head -1)
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$APP_PATH" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR"
          zip -r BVApp-unsigned.ipa Payload/

    artifacts:
      - $CM_BUILD_DIR/BVApp-unsigned.ipa

  # ============================================================
  # ANDROID DEBUG BUILD — No signing needed
  # ============================================================
  android-debug:
    name: Android Debug Build
    max_build_duration: 30

    environment:
      node: 16
      java: 11

    scripts:
      - name: Install Cordova CLI
        script: npm install -g cordova@9.0.0

      - name: Install npm dependencies
        script: npm install

      - name: Add Android platform
        script: cordova platform add android || echo "Already added"

      - name: Add Cordova plugins
        script: |
          cordova plugin add cordova-plugin-whitelist@1.3.5 || true
          cordova plugin add cordova-plugin-inappbrowser@3.2.0 || true

      - name: Build Android debug APK
        script: cordova build android --debug

    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apk
