workflows:
  ios-adhoc:
    name: iOS Ad Hoc Build (iPad iOS 9.3.5)
    max_build_duration: 60
    environment:
      xcode: 9.4.1          # Last Xcode that supports iOS 9.x deployment target
      node: 16               # LTS node compatible with cordova-ios 4.x
      vars:
        BUNDLE_ID: "com.example.bvapp"
        XCODE_WORKSPACE: "platforms/ios/Bhakti Vedanta App.xcworkspace"
        XCODE_SCHEME: "Bhakti Vedanta App"
      # ─── Signing ────────────────────────────────────────────────────────────
      # Add these secrets in Codemagic → Teams → your app → Environment variables
      ios_signing:
        distribution_type: ad_hoc      # change to 'development' if no paid account
        bundle_identifier: com.example.bvapp

    scripts:
      # 1. Install Cordova CLI
      - name: Install Cordova
        script: |
          npm install -g cordova@9

      # 2. Install project dependencies
      - name: Install npm dependencies
        script: |
          npm install

      # 3. Add iOS platform
      - name: Add iOS platform
        script: |
          cordova platform add ios@4.5.5 || true

      # 4. Add required plugins
      - name: Add Cordova plugins
        script: |
          cordova plugin add cordova-plugin-whitelist || true
          cordova plugin add cordova-plugin-inappbrowser || true

      # 5. Prepare (copies www → platforms/ios/www)
      - name: Cordova Prepare
        script: |
          cordova prepare ios

      # 6. Build the iOS app
      - name: Build iOS (xcodebuild)
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/BVApp.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      # 7. Export IPA
      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/BVApp.xcarchive" \
            -exportPath "$CM_BUILD_DIR/output" \
            -exportOptionsPlist /tmp/ExportOptions.plist

    artifacts:
      - $CM_BUILD_DIR/output/*.ipa
      - $CM_BUILD_DIR/output/*.plist

    # ─── Optional: publish to email ─────────────────────────────────────────
    # publishing:
    #   email:
    #     recipients:
    #       - your@email.com

  # ─── Android build (bonus) ──────────────────────────────────────────────────
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      node: 16
      java: 11
    scripts:
      - name: Install Cordova
        script: npm install -g cordova@9

      - name: Install dependencies
        script: npm install

      - name: Add Android platform
        script: cordova platform add android || true

      - name: Add plugins
        script: |
          cordova plugin add cordova-plugin-whitelist || true
          cordova plugin add cordova-plugin-inappbrowser || true

      - name: Build Android APK
        script: cordova build android --debug

    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apk
