workflows:

  # ============================================================
  # iOS UNSIGNED BUILD
  # Uses cordova-ios 7.x + Xcode 16 (fully supported)
  # Output: unsigned .ipa → install with Sideloadly (free)
  # ============================================================
  ios-adhoc:
    name: iOS Unsigned Build (Install via Sideloadly)
    max_build_duration: 60

    environment:
      xcode: latest     # Always picks highest supported Xcode
      node: 18
      vars:
        BUNDLE_ID: "com.bvapp.bhaktivedanta"
        XCODE_SCHEME: "Bhakti Vedanta App"

    scripts:

      - name: Print Xcode version
        script: xcodebuild -version

      - name: Install Cordova CLI
        script: |
          npm install -g cordova@12

      - name: Install npm dependencies
        script: |
          npm install

      - name: Remove old iOS platform if present
        script: |
          cordova platform remove ios || true

      - name: Add iOS platform (cordova-ios 7 - works with Xcode 15/16)
        script: |
          cordova platform add ios@7.0.0

      - name: Add Cordova plugins
        script: |
          cordova plugin add cordova-plugin-inappbrowser@6.0.0 || true

      - name: Cordova prepare iOS
        script: |
          cordova prepare ios

      - name: Install CocoaPods dependencies
        script: |
          cd platforms/ios
          pod install --repo-update

      - name: Archive app (unsigned)
        script: |
          xcodebuild archive \
            -workspace "platforms/ios/Bhakti Vedanta App.xcworkspace" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/BVApp.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            ENABLE_BITCODE=NO \
            ENABLE_ON_DEMAND_RESOURCES=NO \
            SKIP_INSTALL=NO

      - name: Package archive into unsigned .ipa
        script: |
          # Extract .app from the .xcarchive
          APP_PATH=$(find "$CM_BUILD_DIR/BVApp.xcarchive" -name "*.app" | head -1)
          echo "Found .app at: $APP_PATH"
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$APP_PATH" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR"
          zip -r BVApp-unsigned.ipa Payload/
          ls -lh BVApp-unsigned.ipa
          echo "✅ IPA created successfully"

    artifacts:
      - $CM_BUILD_DIR/BVApp-unsigned.ipa

  # ============================================================
  # ANDROID DEBUG BUILD
  # ============================================================
  android-debug:
    name: Android Debug APK
    max_build_duration: 30

    environment:
      node: 18
      java: 17

    scripts:
      - name: Install Cordova CLI
        script: npm install -g cordova@12

      - name: Install npm dependencies
        script: npm install

      - name: Remove old Android platform
        script: cordova platform remove android || true

      - name: Add Android platform
        script: cordova platform add android

      - name: Add plugins
        script: |
          cordova plugin add cordova-plugin-inappbrowser@6.0.0 || true

      - name: Build Android debug APK
        script: cordova build android --debug

    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apk

